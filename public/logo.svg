    <text x="32" y="32.8" text-anchor="middle" dominant-baseline="central" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="18" letter-spacing="-1" fill="url(#core)">iX</text>
