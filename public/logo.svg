      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.10 0 0 0 0 0.80 0 0 0 0 0.72 0 0 0 0.55 0" result="softGlow"/>
      <feMerge>
        <feMergeNode in="softGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="4.5" y="4.5" width="55" height="55" rx="15" fill="#09090B"/>
  <rect x="5.5" y="5.5" width="53" height="53" rx="14" fill="url(#glass)" stroke="url(#tile)" stroke-width="1.5"/>
  <path d="M17 22.5h23.8c4.4 0 7.9 3.5 7.9 7.9v.7" fill="none" stroke="#14B8A6" stroke-width="3.2" stroke-linecap="round"/>
  <path d="M42.6 16.7 49 23l-6.4 6.2" fill="none" stroke="#14B8A6" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M47 41.5H23.2c-4.4 0-7.9-3.5-7.9-7.9v-.7" fill="none" stroke="#FF7A1A" stroke-width="3.2" stroke-linecap="round"/>
  <path d="M21.4 47.3 15 41l6.4-6.2" fill="none" stroke="#FF7A1A" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
  <g filter="url(#glow)">
