name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Type check (the real gate — next build ignores type errors)
        run: npx tsc --noEmit
      - name: Lint (non-blocking; existing debt)
        run: npm run lint || true
